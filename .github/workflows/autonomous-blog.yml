name: Autonomous Blog Engine

on:
  schedule:
    # Every Monday at 14:00 UTC (9 AM EST / 10 AM EDT).
    # Time will shift by 1 hour locally with daylight-saving — that's fine.
    - cron: '0 14 * * 1'
  workflow_dispatch:
    # Allows manual triggering from the GitHub UI:
    # Actions → Autonomous Blog Engine → Run workflow

# If a prior run is still going, skip the new one rather than racing it.
concurrency:
  group: autonomous-blog
  cancel-in-progress: false

jobs:
  write-and-publish:
    runs-on: ubuntu-latest
    # Skip the entire job when the FEATURE_BLOG_ENGINE GitHub variable is set
    # to 'false'. Put this var in GitHub → Settings → Variables (not Secrets).
    if: vars.FEATURE_BLOG_ENGINE != 'false'
    permissions:
      # Needed so the workflow can commit the new MDX file and push it back
      # to main, which in turn triggers a Vercel deploy.
      contents: write

    # If the working directory is not yash-makeovers/ at the repo root,
    # update this and the paths below.
    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Full history so git pull --rebase works inside the publisher.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install runtime deps for the engine
        # The scripts only need these two packages — no need to install
        # the full Next.js dependency tree here.
        run: npm install --no-save @anthropic-ai/sdk resend

      - name: Run blog engine
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          DEVELOPER_EMAIL:      ${{ secrets.DEVELOPER_EMAIL }}
          FEATURE_BLOG_ENGINE:  ${{ vars.FEATURE_BLOG_ENGINE }}
          FEATURE_BLOG_NOTIFY:  ${{ vars.FEATURE_BLOG_NOTIFY }}
        run: node scripts/blog-engine.mjs
